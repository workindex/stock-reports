site_name: 주식 분석 리포트
site_description: Weinstein·Minervini·Turtle 프레임워크 기반 종목 분석 (투자 권유 아님)
theme:
  name: material
  custom_dir: overrides
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - callouts            # Obsidian > [!warning] → Material admonition
  - roamlinks           # [[위키링크]] → 상대 경로 링크

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/verdict.css        # 판정 색상 배지

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js   # 표 헤더 클릭 정렬
  - javascripts/tablesort.js

nav:
  - 홈: index.md
  - 관찰 종목: watchlist/index.md
  - 분석 스냅샷: snapshots/index.md
  - 알림: alerts/index.md

# 상세 페이지(watchlist/*, snapshots/*, alerts/{uid})는 nav에 직접 넣지 않고
# 각 인덱스에서 링크한다 — '누락' 경고를 끈다.
validation:
  nav:
    omitted_files: ignore
  links:
    not_found: warn
