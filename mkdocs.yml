site_name: 주식 분석 리포트
site_description: Weinstein·Minervini·Turtle 프레임워크 기반 종목 분석 (투자 권유 아님)
theme:
  name: material
  custom_dir: overrides
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드
  features:
    - navigation.instant
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search
  - callouts            # Obsidian > [!warning] → Material admonition
  - roamlinks           # [[위키링크]] → 상대 경로 링크

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

nav:
  - 홈: index.md
